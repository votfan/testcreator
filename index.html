<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TestMaster | Full Stack</title>
    <style>
        /* Стили оставляем те же, что были в твоем коде */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; padding: 20px; }
        .app-container { max-width: 800px; margin: 0 auto; background: #1e1e2a; border-radius: 24px; padding: 30px; border: 1px solid #333345; }
        .card { background: #252535; border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid #333345; }
        .btn { padding: 12px 20px; border-radius: 50px; border: none; cursor: pointer; font-weight: 600; transition: 0.3s; font-size: 14px; text-align: center; }
        .btn-primary { background: #6366f1; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-outline { background: transparent; border: 1px solid #6366f1; color: #6366f1; }
        input { background: #1a1a26; border: 1px solid #333345; color: white; padding: 12px; border-radius: 10px; width: 100%; margin-bottom: 15px; outline: none; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: #1e1e2a; width: 95%; max-width: 600px; max-height: 90vh; overflow-y: auto; border-radius: 20px; padding: 30px; border: 1px solid #333345; }
        .code-badge { background: #6366f1; color: white; padding: 4px 10px; border-radius: 6px; font-family: monospace; }
        .option-item { display: flex; gap: 10px; margin-bottom: 8px; align-items: center; }
    </style>
</head>
<body>

<div id="app" class="app-container">Загрузка данных с сервера...</div>

<script>
    (function(){
        const ADMIN_PASS = 'ADMIN2025';
        let currentUser = JSON.parse(sessionStorage.getItem('tm_user')) || null;
        let tests = [];
        let activeQuiz = null;

        // --- ФУНКЦИИ ВЗАИМОДЕЙСТВИЯ С БЭКЕНДОМ ---
        async function apiFetch(url, method = 'GET', body = null) {
            const options = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) options.body = JSON.stringify(body);
            const res = await fetch(url, options);
            if (!res.ok) { const err = await res.json(); throw new Error(err.error || 'Ошибка сервера'); }
            return res.json();
        }

        async function loadTests() {
            try { tests = await apiFetch('/api/tests'); render(); }
            catch (e) { console.error(e); }
        }

        // --- РЕНДЕР ИНТЕРФЕЙСА ---
        function renderAuth(isReg = false) {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div style="max-width: 350px; margin: 60px auto;">
                    <h1 style="text-align:center; margin-bottom:30px;">TestMaster</h1>
                    <div class="card">
                        <h3>${isReg ? 'Регистрация' : 'Вход'}</h3>
                        <input type="text" id="uName" placeholder="Логин">
                        <input type="password" id="uPass" placeholder="Пароль">
                        ${isReg ? '<input type="password" id="aCode" placeholder="Код админа (опционально)">' : ''}
                        <button class="btn btn-primary" id="authBtn" style="width:100%; margin-top:10px;">${isReg ? 'Создать' : 'Войти'}</button>
                        <p id="toggleAuth" style="text-align:center; margin-top:15px; font-size:13px; color:#888; cursor:pointer;">
                            ${isReg ? 'Уже есть аккаунт? Войти' : 'Нет аккаунта? Регистрация'}
                        </p>
                    </div>
                </div>
            `;
            document.getElementById('toggleAuth').onclick = () => renderAuth(!isReg);
            document.getElementById('authBtn').onclick = async () => {
                const name = document.getElementById('uName').value.trim();
                const pass = document.getElementById('uPass').value.trim();
                try {
                    if (isReg) {
                        const role = document.getElementById('aCode').value === ADMIN_PASS ? 'admin' : 'user';
                        await apiFetch('/api/register', 'POST', { name, pass, role });
                        alert('Регистрация успешна!'); renderAuth(false);
                    } else {
                        currentUser = await apiFetch('/api/login', 'POST', { name, pass });
                        sessionStorage.setItem('tm_user', JSON.stringify(currentUser));
                        loadTests();
                    }
                } catch (e) { alert(e.message); }
            };
        }

        function render() {
            if (!currentUser) return renderAuth();
            const app = document.getElementById('app');
            app.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                    <h2>Привет, ${currentUser.name}</h2>
                    <button class="btn btn-outline" onclick="sessionStorage.clear(); location.reload();">Выход</button>
                </div>
                <div class="card" style="border: 1px dashed #6366f1;">
                    <h4>Вход по коду</h4>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <input type="text" id="searchCode" placeholder="Код теста" style="margin:0;">
                        <button class="btn btn-primary" id="goBtn">Начать</button>
                    </div>
                </div>
                ${currentUser.role === 'admin' ? '<button class="btn btn-primary" id="createTest" style="width:100%; margin-bottom:20px;">+ Создать тест</button>' : ''}
                <div id="list"></div>
            `;

            document.getElementById('goBtn').onclick = () => {
                const code = document.getElementById('searchCode').value.trim().toUpperCase();
                const test = tests.find(t => t.code === code);
                if (test) startQuiz(test); else alert('Код не найден');
            };

            if (currentUser.role === 'admin') document.getElementById('createTest').onclick = () => openEditor();

            const list = document.getElementById('list');
            tests.forEach((t, i) => {
                const item = document.createElement('div');
                item.className = 'card';
                item.style.display = 'flex';
                item.style.justifyContent = 'space-between';
                item.innerHTML = `
                    <div><h3>${t.name}</h3><span class="code-badge">${t.code}</span></div>
                    <div style="display:flex; gap:8px;">
                        ${currentUser.role === 'admin' ?
                          `<button class="btn btn-outline edit-btn">Изменить</button>
                           <button class="btn btn-danger delete-btn">Удалить</button>` :
                          `<button class="btn btn-primary play-btn">Пройти</button>`}
                    </div>
                `;
                if(currentUser.role === 'admin') {
                    item.querySelector('.edit-btn').onclick = () => openEditor(i);
                    item.querySelector('.delete-btn').onclick = async () => {
                        if(confirm('Удалить тест?')) { await apiFetch(`/api/tests/${t.code}`, 'DELETE'); loadTests(); }
                    };
                } else {
                    item.querySelector('.play-btn').onclick = () => startQuiz(t);
                }
                list.appendChild(item);
            });
        }

        // Функции openEditor, startQuiz, renderQuiz и renderResults остаются из твоей последней версии,
        // но внутри saveT используем: await apiFetch('/api/tests', 'POST', workingTest); loadTests();

        function openEditor(idx = null) {
            let workingTest = idx !== null ? JSON.parse(JSON.stringify(tests[idx])) : {
                name: '', code: Math.random().toString(36).substring(2,7).toUpperCase(),
                questions: [{ text: '', options: ['', ''], correct: [0], points: 1 }]
            };
            const modal = document.createElement('div');
            modal.className = 'modal';
            document.body.appendChild(modal);

            const draw = () => {
                modal.innerHTML = `
                    <div class="modal-content">
                        <h2>Редактор</h2>
                        <input type="text" id="edN" placeholder="Название" value="${workingTest.name}">
                        <div id="qBox">
                            ${workingTest.questions.map((q, i) => `
                                <div class="card" style="background:#1a1a26;">
                                    <input type="text" class="q-txt" value="${q.text}" placeholder="Вопрос">
                                    <input type="number" class="q-pts" value="${q.points}" style="width:80px;">
                                    ${q.options.map((opt, oi) => `
                                        <div class="option-item">
                                            <input type="checkbox" ${q.correct.includes(oi) ? 'checked' : ''} class="q-chk" data-oi="${oi}">
                                            <input type="text" class="q-opt" value="${opt}" placeholder="Вариант">
                                        </div>
                                    `).join('')}
                                </div>
                            `).join('')}
                        </div>
                        <button class="btn btn-outline" id="addQBtn" style="width:100%; margin-bottom:10px;">+ Вопрос</button>
                        <button class="btn btn-primary" id="saveT" style="width:100%;">Сохранить на сервер</button>
                    </div>
                `;
                document.getElementById('addQBtn').onclick = () => { sync(); workingTest.questions.push({text:'', options:['',''], correct:[0], points:1}); draw(); };
                document.getElementById('saveT').onclick = async () => { sync(); await apiFetch('/api/tests', 'POST', workingTest); modal.remove(); loadTests(); };
            };
            const sync = () => {
                workingTest.name = document.getElementById('edN').value;
                workingTest.questions = Array.from(document.querySelectorAll('#qBox .card')).map(card => ({
                    text: card.querySelector('.q-txt').value,
                    points: parseInt(card.querySelector('.q-pts').value),
                    options: Array.from(card.querySelectorAll('.q-opt')).map(i => i.value),
                    correct: Array.from(card.querySelectorAll('.q-chk')).filter(c => c.checked).map(c => parseInt(c.dataset.oi))
                }));
            };
            draw();
        }

        function startQuiz(test) { activeQuiz = { test, current: 0, score: 0 }; renderQuiz(); }
        function renderQuiz() {
            const q = activeQuiz.test.questions[activeQuiz.current];
            document.getElementById('app').innerHTML = `
                <div class="card">
                    <h3>${q.text}</h3>
                    ${q.options.map((opt, i) => `<button class="btn btn-outline quiz-opt" style="width:100%; margin-bottom:10px;" data-oi="${i}">${opt}</button>`).join('')}
                </div>
            `;
            document.querySelectorAll('.quiz-opt').forEach(btn => btn.onclick = () => {
                if(q.correct.includes(parseInt(btn.dataset.oi))) activeQuiz.score += q.points;
                if(++activeQuiz.current < activeQuiz.test.questions.length) renderQuiz(); else renderResults();
            });
        }
        function renderResults() {
            document.getElementById('app').innerHTML = `<div class="card" style="text-align:center;"><h2>Результат: ${activeQuiz.score}</h2><button class="btn btn-primary" onclick="location.reload()">Меню</button></div>`;
        }

        if (currentUser) loadTests(); else renderAuth();
    })();
</script>
</body>
</html>
